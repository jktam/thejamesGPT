name: Deploy Bot

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: deploy-bot
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile source files
        run: python -m py_compile bot.py core_bot.py config.py help_data.py cogs/*.py services/*.py utils/*.py

  deploy:
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail

          cd "${{ secrets.SERVER_PROJECT_PATH }}"

          git fetch origin main
          git reset --hard origin/main

          sudo apt update
          sudo apt install -y python3.10-venv

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

          sudo systemctl daemon-reload
          sudo systemctl restart "${{ secrets.SERVER_SYSTEMD_BOT }}"
          sudo systemctl status "${{ secrets.SERVER_SYSTEMD_BOT }}" --no-pager --lines=25
