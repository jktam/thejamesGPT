name: Deploy Bot

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-bot
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail

          cd "${{ secrets.SERVER_PROJECT_PATH }}"

          git fetch origin main
          git reset --hard origin/main

          sudo apt update
          sudo apt install -y python3.10-venv

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          source .venv/bin/activate
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install discord.py python-dotenv aiohttp openai beautifulsoup4
          fi

          sudo systemctl daemon-reload
          sudo systemctl restart "${{ secrets.SERVER_SYSTEMD_BOT }}"
          sudo systemctl status "${{ secrets.SERVER_SYSTEMD_BOT }}" --no-pager --lines=25